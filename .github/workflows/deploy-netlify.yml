name: Deploy to Netlify

# Auto-deploys to your Netlify project on every push to main/master.
# Requires two GitHub repo secrets (Settings → Secrets and variables → Actions):
#   NETLIFY_AUTH_TOKEN  → from Netlify → User Settings → Applications → Personal access tokens
#   NETLIFY_SITE_ID     → ba6e6175-0d05-4a3e-9228-36c08f2855c8  (your project ID)

on:
  push:
    branches: [main, master]
  workflow_dispatch: {}        # also lets you trigger manually from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          netlify deploy \
            --site "$NETLIFY_SITE_ID" \
            --auth "$NETLIFY_AUTH_TOKEN" \
            --dir "." \
            --prod \
            --message "Auto-deploy: ${{ github.event.head_commit.message || github.sha }}"
