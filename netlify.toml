# ═══════════════════════════════════════════════════════════════════════════
# Netlify deploy config — Vahdam Marketing Mailer Architect
# Site: https://app.netlify.com/projects/vahdam-marketing-mailer-architect
# ═══════════════════════════════════════════════════════════════════════════

[build]
  # No build step needed — pure static HTML
  publish = "."
  command = "echo 'Static site — no build step required'"

[build.environment]
  NODE_VERSION = "20"

# Make the studio reachable at the project root with a clean URL
[[redirects]]
  from = "/"
  to = "/vahdam_mailer_architect_v23.html"
  status = 200
  force = false

# Pretty alias /studio → vahdam_mailer_architect_v23.html
[[redirects]]
  from = "/studio"
  to = "/vahdam_mailer_architect_v23.html"
  status = 200

# SPA-style fallback for any unknown path
[[redirects]]
  from = "/*"
  to = "/vahdam_mailer_architect_v23.html"
  status = 200

# ── Headers ─────────────────────────────────────────────────────────────────
# Cache-bust the main HTML on every deploy so users don't get stale JS.
# Static assets in /supabase folder can cache longer.
[[headers]]
  for = "/vahdam_mailer_architect_v23.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/supabase/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# ── Functions (reserved — empty for now) ────────────────────────────────────
# If you later add Netlify Functions for server-side AI calls, they go here:
# [functions]
#   directory = "netlify/functions"
